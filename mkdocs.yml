site_name: Snakie
site_url: https://docs.snakie.org/
site_description: >-
  Snakie is a friendly, cross-platform MicroPython editor — write code, talk to
  your board, see your wiring come alive, and build robots in 3-D.
site_author: Kevin McAleer
copyright: Copyright &copy; Kevin McAleer

repo_name: kevinmcaleer/Snakie
repo_url: https://github.com/kevinmcaleer/Snakie
edit_uri: https://github.com/kevinmcaleer/snakie-docs/edit/main/docs/

theme:
  name: material
  language: en
  icon:
    logo: material/snake
    repo: fontawesome/brands/github
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: light green
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: light green
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search

extra:
  social:
    - icon: material/web
      link: https://www.snakie.org/
      name: Snakie website
    - icon: material/robot
      link: https://www.kevsrobots.com/
      name: Robot projects and free courses at KevsRobots
    - icon: fontawesome/brands/github
      link: https://github.com/kevinmcaleer/Snakie
      name: Snakie on GitHub
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/@kevinmcaleer
      name: Kevin McAleer on YouTube

